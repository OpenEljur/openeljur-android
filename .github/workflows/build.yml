name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          API_BASE_URL=${{ secrets.API_BASE_URL || 'https://openeljur-api.vercel.app' }}
          DEFAULT_SCHOOL_ID=${{ secrets.DEFAULT_SCHOOL_ID || 'eljur' }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DEFAULT_SCHOOL_ID: ${{ secrets.DEFAULT_SCHOOL_ID }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out app/build/outputs/apk/release/OpenEljur-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenEljur-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenEljur ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
